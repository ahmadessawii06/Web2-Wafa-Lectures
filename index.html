<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebTwoLectures · Dr. Wafa Adham · recordings</title>
    <link rel="icon" type="image/png" href="favicon.svg" />
    <style>
      /* ----- RESET & BASE (with background canvas) ----- */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          "Inter",
          system-ui,
          "Segoe UI",
          sans-serif;
        line-height: 1.5;
        color: #1e293b;
        min-height: 100vh;
        position: relative;
        background-color: #0b0e14; /* fallback dark */
      }

      /* canvas for moving code background (matrix-like rain) */
      #bg-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        pointer-events: none;
        opacity: 0.3; /* slightly more subtle to let cards pop */
      }

      /* main container – centered, max width, sits above canvas */
      .container {
        max-width: 1200px;
        width: 100%;
        margin: 0 auto;
        padding: 2rem 1rem;
        position: relative;
        z-index: 2;
      }

      /* ----- HEADER RECTANGLE (with translucency) ----- */
      .header {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-radius: 24px;
        padding: 1.5rem 2rem;
        margin-bottom: 2.5rem;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.3);
      }

      .header-top {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        align-items: center;
        gap: 1rem 1.5rem;
        margin-bottom: 0.75rem;
      }

      .header-top span:first-child {
        font-weight: 600;
        font-size: 1.3rem;
        letter-spacing: -0.01em;
        background: linear-gradient(145deg, #0f1e2f, #1b3b4f);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .header-top span:last-child {
        background: rgba(230, 240, 255, 0.7);
        backdrop-filter: blur(4px);
        padding: 0.35rem 1rem;
        border-radius: 40px;
        font-size: 0.9rem;
        font-weight: 500;
        color: #0c2b3b;
        border: 1px solid rgba(255, 255, 255, 0.6);
      }

      .header-bottom {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        align-items: center;
        gap: 0.75rem 2rem;
        padding-top: 0.5rem;
        border-top: 2px dashed rgba(0, 70, 120, 0.2);
      }

      .header-bottom span {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        font-size: 1rem;
      }

      .header-bottom a {
        color: #1f4f8a;
        
        font-weight: 500;
        padding: 0.2rem 0.6rem;
        background: rgba(220, 240, 255, 0.8);
        border-radius: 30px;
        transition: all 0.2s;
        border: 1px solid transparent;
      }

      .header-bottom a:hover {
        background: white;
        border-color: #1f4f8a;
        box-shadow: 0 2px 8px rgba(0, 70, 150, 0.25);
      }

      #lecture-count {
        background: #1f4f8a;
        color: white;
        font-weight: 600;
        padding: 0.2rem 0.7rem;
        border-radius: 40px;
        margin-left: 0.3rem;
        font-size: 0.9rem;
      }

      /* ----- LECTURE CARDS GRID (glassmorphism) ----- */
      .cards-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 1.8rem;
      }

      .card {
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-radius: 32px;
        padding: 2rem 1.5rem 1.8rem 1.5rem;
        box-shadow: 0 20px 35px -8px rgba(0, 0, 0, 0.3);
        transition: all 0.25s ease;
        border: 1px solid rgba(255, 255, 255, 0.5);
        display: flex;
        flex-direction: column;
      }

      .card:hover {
        transform: translateY(-6px);
        box-shadow: 0 28px 40px -12px rgba(0, 30, 60, 0.4);
        background: rgba(255, 255, 255, 0.95);
        border-color: rgba(255, 255, 255, 0.9);
      }

      /* circular lecture number */
      .lecture-circle {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: #1f4f8a;
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 1.5rem;
        box-shadow: 0 6px 14px rgba(0, 60, 120, 0.3);
        border: 2px solid rgba(255, 255, 255, 0.5);
      }

      .lecture-header {
        display: flex;
        align-items: center;
        gap: 1rem;
        margin-bottom: 0.75rem;
      }

      .card .title {
        font-size: 1.3rem;
        font-weight: 600;
        color: #0f2a40;
        margin-bottom: 0;
        border-left: 4px solid #1f4f8a;
        padding-left: 0.75rem;
      }

      .card .date {
        font-size: 0.95rem;
        color: #2b5575;
        margin-bottom: 1.6rem;
        display: flex;
        align-items: center;
        gap: 0.3rem;
      }

      .card .date::before {
        content: "📅";
        font-size: 1rem;
        opacity: 0.8;
      }

      .card .btn {
        background: #1f4f8a;
        border: none;
        color: white;
        font-weight: 600;
        font-size: 1rem;
        padding: 0.85rem 1rem;
        border-radius: 50px;
        cursor: pointer;
        transition: 0.15s;
        margin-top: auto;
        border: 1px solid #1f4f8a;
        box-shadow: 0 4px 10px rgba(0, 60, 130, 0.3);
        letter-spacing: 0.3px;
        text-align: center;
      }

      .card .btn:hover {
        background: #0f3a6b;
        border-color: #0f3a6b;
        box-shadow: 0 8px 16px rgba(0, 60, 130, 0.4);
      }

      .card .btn:active {
        background: #09223f;
        transform: scale(0.98);
      }

      /* small screens adjustments */
      @media (max-width: 640px) {
        .container {
          padding: 1rem 0.8rem;
        }
        .header {
          padding: 1.2rem 1.2rem;
        }
        .header-top {
          flex-direction: column;
          align-items: start;
        }
        .header-bottom {
          flex-direction: column;
          align-items: start;
        }
      }
    </style>
  </head>
  <body>
    <!-- canvas background with moving "code rain" -->
    <canvas id="bg-canvas"></canvas>

    <div class="container">
      <!-- HEADER RECTANGLE -->
      <header class="header">
        <div class="header-top">
          <span>WebTwoLectures – Dr. Wafa Adham</a></span>
          <span>Made By 
            <a href="https://github.com/ahmadessawii06">Ahmad Essawii</a>
          </span>
        </div>
        <div class="header-bottom">
          <span>📘 Lectures: <span id="lecture-count">0</span></span>
          <span
            >📎 Slides:
            <a
              href="https://drive.google.com/drive/folders/1V4lIBkTQLwHPSqHY-ybVplbTp9C6y59g?usp=sharing"
              target="_blank"
              >Link of Slides</a
            >
          
            </span
          >
          
          <span>🗓️ Second Semester 2026</span>
        </div>
      </header>

      <!-- DYNAMIC CARD GRID (populated by javascript) -->
      <section class="cards-grid" id="cards-grid"></section>
    </div>

    <script>
      (function () {
        // ---------- LECTURE DATA (from user's actual Zoom recordings) ----------
        const lectures = [
          {
            number: 1,
            title: "CSS Review",
            date: "Februray 7, 2026 - [2026/02/07]",
            link: "https://najah.zoom.us/rec/share/GfE-yw1L3OrrpK7-4_NmH1Y3TwqD2L9-RE25ZGmRzAyy_fQp3EruBz7EmFxIPZs.f6yiy4x49yTmpgh8?startTime=1770466561000",
          },
          {
            number: 2,
            title: "Intro To BootStrap",
            date: "February 14, 2026 - [2026/02/17]",
            link: "https://najah.zoom.us/rec/share/jnXrUs1vDCTF4bRG0u16ZXqkDj1YrtQehoxVa2Ew5Ub48dmpmYC-75fMTHrUCfCi.45mSQeHfV4mw-sJD",
          },
          {
            number: 3,
            title: "React Project Bootstrap",
            date: "February 21, 2026 - [2026/02/21]",
            link: "https://najah.zoom.us/rec/share/7LRQXY2UVmUPSsKy1CGQSZcBMBHV3ytzP3WPhrN10jWZZxvfjTk7bTBpKIPqD6b_.JC_ZhQcYJ_AnfVmu",
          },
          {
            number: 4,
            title: "Intro To BackEnd",
            date: "March 1, 2026 - [2026/03/01]",
            link: "https://najah.zoom.us/rec/play/i_cV4PdIHhkvTe6BQpdP_ZTJgqVLvc-HzaQJjQdWLXVQ7LXCrk9OmTTt67cMD9HKwfHPK_b2mYHsZJ2e.Ub-_vFTDfuTBlhVH?eagerLoadZvaPages=sidemenu.billing.plan_management&accessLevel=meeting&canPlayFromShare=true&from=share_recording_detail&continueMode=true&componentName=rec-play&originRequestUrl=https%3A%2F%2Fnajah.zoom.us%2Frec%2Fshare%2F3Xel1XxLfGbRfmLXL_6y4lkHfo3B3DHZxlm2fSU-pmNyiH1silzrjMYjBRPKV92r.Tso4KuNnG_EYph1h",
          },
          {number:5,
            title: "Intro To BackEnd Part-2",
            date: "March Mar 10, 2026 - [2026/03/10]",
            link: "https://najah.zoom.us/rec/play/iCs7ng-5gt39DkIOay0NP0CDi6cvbmsjDWjcNZNTDUNqySTPoe5309SylRzRpEXAoh8qYm4OBeWqc7gn.nLEEW1qcAUpH50mW?eagerLoadZvaPages=sidemenu.billing.plan_management&accessLevel=meeting&canPlayFromShare=true&from=share_recording_detail&continueMode=true&componentName=rec-play&originRequestUrl=https%3A%2F%2Fnajah.zoom.us%2Frec%2Fshare%2FbvRwZDo4JCzZ7Ok0nGcUopq6B-Aul1kcbj0qNU67GqXh1jOthjoVdJBnN5ApHsMB.6anX_3vDtdh3RY-t"
          },


          {
            number:6,
            title: "Intro To BackEnd Part-3",
            date: "March Mar 15, 2026 - [2026/03/15]",
            link: "https://najah.zoom.us/rec/play/n5huF3EDZ_UvvobanlkfDYPWSL5_QmZFFQbMGphmLTivdb3e5YfPskfhmrA0cqj-bfzLbigUoZOPEsR1.uFOMpkHSI17EnxJD?eagerLoadZvaPages=sidemenu.billing.plan_management&accessLevel=meeting&canPlayFromShare=true&from=share_recording_detail&continueMode=true&componentName=rec-play&originRequestUrl=https%3A%2F%2Fnajah.zoom.us%2Frec%2Fshare%2Fool2OfLz6-yvaxJw0ith0VzrgIskfS3c1B72rJbWNVVgR9ocSqph6OvW8vo-lZjc.Kwaf0k5q1_NpdHlJ"




          }
,
            {
            number:7,
            title: "Intro To BackEnd Part-4",
            date: "March Mar 18, 2026 - [2026/03/18]",
            link: "https://youtu.be/1uypE_42kuc"




          }


        ];

        // ---------- RENDER CARDS WITH CIRCLE NUMBER & REAL ZOOM LINKS ----------
        function renderLectureCards() {
          const grid = document.getElementById("cards-grid");
          if (!grid) return;

          grid.innerHTML = "";

          lectures.forEach((lect) => {
            const card = document.createElement("div");
            card.className = "card";

            // using a circle for lecture number + separate title
            card.innerHTML = `
            <div class="lecture-header">
              <div class="lecture-circle">${lect.number}</div>
              <p class="title">${lect.title}</p>
            </div>
            <p class="date">${lect.date}</p>
            <button class="btn" data-link="${lect.link}">🎬 Watch recording</button>
          `;

            // attach click handler to open Zoom link in new tab
            const button = card.querySelector(".btn");
            button.addEventListener("click", (e) => {
              e.preventDefault();
              const link = button.getAttribute("data-link");
              if (link) {
                window.open(link, "_blank", "noopener,noreferrer");
              } else {
                alert("Recording link not available.");
              }
            });

            grid.appendChild(card);
          });

          // update header count
          document.getElementById("lecture-count").textContent =
            lectures.length;
        }

        // run on DOM ready
        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", renderLectureCards);
        } else {
          renderLectureCards();
        }

        // ---------- BACKGROUND "CODE RAIN" (matrix-like, keeps the vibe) ----------
        const canvas = document.getElementById("bg-canvas");
        const ctx = canvas.getContext("2d");

        let width, height;
        let columns = [];
        const fontSize = 18; // size of each "character"
        const chars =
          "01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲンｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜｦﾝABCDEFGHIJKLMNOPQRSTUVWXYZ{}[]<>/\\|=+-_*&^%$#@!~";

        function initCanvas() {
          width = window.innerWidth;
          height = window.innerHeight;
          canvas.width = width;
          canvas.height = height;

          // number of columns based on character width
          const colCount = Math.ceil(width / fontSize);
          columns = [];
          for (let i = 0; i < colCount; i++) {
            columns[i] = Math.floor(Math.random() * -height); // start above screen
          }
        }

        function drawRain() {
          // semi-transparent black to create trail effect
          ctx.fillStyle = "rgba(8, 12, 18, 0.07)";
          ctx.fillRect(0, 0, width, height);

          ctx.fillStyle = "#8dd0ff"; // light blue code
          ctx.font = `bold ${fontSize}px 'Courier New', monospace`;
          ctx.textAlign = "center";

          for (let i = 0; i < columns.length; i++) {
            // pick a random character
            const char = chars[Math.floor(Math.random() * chars.length)];
            const x = i * fontSize + fontSize / 2;
            const y = columns[i];

            // draw character
            ctx.fillText(char, x, y);

            // move column down, reset if off screen
            if (y > height + fontSize) {
              columns[i] = -fontSize * Math.random() * 10;
            } else {
              columns[i] += fontSize * 0.5; // speed
            }
          }
          requestAnimationFrame(drawRain);
        }

        window.addEventListener("resize", () => {
          initCanvas();
        });

        // start background
        initCanvas();
        drawRain();
      })();
    </script>
  </body>
</html>
